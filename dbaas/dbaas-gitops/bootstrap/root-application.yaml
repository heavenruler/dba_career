apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dbaas-root
  namespace: argocd
spec:
  project: dbaas
  source:
    repoURL: REPLACE_WITH_YOUR_GIT_REPO_URL
    targetRevision: HEAD
    path: clusters/lab/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
