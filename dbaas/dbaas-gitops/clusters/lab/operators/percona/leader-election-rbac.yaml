apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: percona-operator-leader-election
  namespace: percona-operator
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: percona-operator-leader-election
  namespace: percona-operator
subjects:
  - kind: ServiceAccount
    name: percona-xtradb-cluster-operator
    namespace: percona-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: percona-operator-leader-election
