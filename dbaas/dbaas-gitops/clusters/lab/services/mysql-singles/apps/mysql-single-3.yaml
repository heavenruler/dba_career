apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: {name: mysql-single-3, namespace: argocd}
spec:
  project: dbaas
  source: {repoURL: https://github.com/heavenruler/dba_career.git, targetRevision: master, path: dbaas/dbaas-gitops/clusters/lab/services/mysql-singles/instances/mysql-single-3}
  destination: {server: https://kubernetes.default.svc, namespace: mysql-single-3}
  syncPolicy: {automated: {prune: true, selfHeal: true}, syncOptions: [CreateNamespace=true]}
