apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysqld-exporter
  namespace: mysql-single
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysqld-exporter
  template:
    metadata:
      labels:
        app: mysqld-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9104"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: mysqld-exporter
          image: prom/mysqld-exporter:v0.16.0
          args:
            - --config.my-cnf=/etc/mysql-exporter/.my.cnf
          ports:
            - name: metrics
              containerPort: 9104
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/mysql-exporter
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: mysqld-exporter
---
apiVersion: v1
kind: Service
metadata:
  name: mysqld-exporter
  namespace: mysql-single
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9104"
    prometheus.io/path: /metrics
spec:
  selector:
    app: mysqld-exporter
  ports:
    - name: metrics
      port: 9104
      targetPort: 9104
