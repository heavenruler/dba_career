apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tidb-cluster
  namespace: argocd
spec:
  project: dbaas
  source:
    repoURL: https://github.com/heavenruler/dba_career.git
    targetRevision: master
    path: dbaas/dbaas-gitops/clusters/lab/services/tidb-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: tidb-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
