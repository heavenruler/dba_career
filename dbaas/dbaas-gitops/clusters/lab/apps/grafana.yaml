apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: dbaas
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.15
    helm:
      releaseName: grafana
      values: |
        adminUser: admin
        adminPassword: admin123456
        initChownData:
          enabled: false
        persistence:
          enabled: true
          storageClassName: local-path
          size: 10Gi
        service:
          type: NodePort
          port: 3000
          nodePort: 30300
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: VictoriaMetrics
                uid: victoriametrics
                type: prometheus
                access: proxy
                url: http://victoria-metrics-server.monitoring:8428
                isDefault: true
              - name: Tempo
                uid: tempo
                type: tempo
                access: proxy
                url: http://tempo.monitoring:3200
        testFramework:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
