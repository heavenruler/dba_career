apiVersion: v1
kind: Pod
metadata:
  name: redis-sentinel
  labels:
    app: redis-sentinel
spec:
  containers:
    - name: redis-sentinel-master-1
      image: docker.io/library/redis:7.2
      command: ["redis-server"]
      args: ["--appendonly", "yes", "--port", "6390"]
      ports:
        - containerPort: 6390
          hostPort: 6390

    - name: redis-sentinel-replica-1
      image: docker.io/library/redis:7.2
      command: ["redis-server"]
      args: ["--port", "6391", "--replicaof", "127.0.0.1", "6390"]
      ports:
        - containerPort: 6391
          hostPort: 6391

    - name: redis-sentinel-node-1
      image: docker.io/library/redis:7.2
      command: ["/bin/sh", "-c"]
      args:
        - |
          cat >/tmp/sentinel.conf <<CFG
          port 26379
          sentinel monitor mymaster 127.0.0.1 6390 2
          sentinel down-after-milliseconds mymaster 5000
          sentinel failover-timeout mymaster 10000
          sentinel parallel-syncs mymaster 1
          CFG
          exec redis-sentinel /tmp/sentinel.conf
      ports:
        - containerPort: 26379
          hostPort: 26379

    - name: redis-sentinel-node-2
      image: docker.io/library/redis:7.2
      command: ["/bin/sh", "-c"]
      args:
        - |
          cat >/tmp/sentinel.conf <<CFG
          port 26380
          sentinel monitor mymaster 127.0.0.1 6390 2
          sentinel down-after-milliseconds mymaster 5000
          sentinel failover-timeout mymaster 10000
          sentinel parallel-syncs mymaster 1
          CFG
          exec redis-sentinel /tmp/sentinel.conf
      ports:
        - containerPort: 26380
          hostPort: 26380

    - name: redis-sentinel-node-3
      image: docker.io/library/redis:7.2
      command: ["/bin/sh", "-c"]
      args:
        - |
          cat >/tmp/sentinel.conf <<CFG
          port 26381
          sentinel monitor mymaster 127.0.0.1 6390 2
          sentinel down-after-milliseconds mymaster 5000
          sentinel failover-timeout mymaster 10000
          sentinel parallel-syncs mymaster 1
          CFG
          exec redis-sentinel /tmp/sentinel.conf
      ports:
        - containerPort: 26381
          hostPort: 26381
