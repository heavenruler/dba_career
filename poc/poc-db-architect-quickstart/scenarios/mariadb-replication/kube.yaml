apiVersion: v1
kind: Pod
metadata:
  name: mariadb-replication
  labels:
    app: mariadb-replication
spec:
  restartPolicy: Always
  containers:
    - name: mariadb-replication-master-1
      image: __MARIADB_IMAGE__
      ports:
        - containerPort: 3306
          hostPort: 3317
      env:
        - name: MARIADB_ROOT_PASSWORD
          value: rootpass
        - name: MARIADB_DATABASE
          value: appdb
      command:
        - sh
        - -c
        - |
          cat >/etc/mysql/conf.d/z-replication.cnf <<'EOF'
          [mariadb]
          port=3306
          bind-address=0.0.0.0
          server_id=101
          log_bin=mysql-bin
          binlog_format=ROW
          skip_name_resolve=ON
          EOF
          exec docker-entrypoint.sh mariadbd
      volumeMounts:
        - mountPath: /var/lib/mysql
          name: mariadb-replication-master-data
    - name: mariadb-replication-replica-1
      image: __MARIADB_IMAGE__
      ports:
        - containerPort: 3307
          hostPort: 3318
      env:
        - name: MARIADB_ROOT_PASSWORD
          value: rootpass
      command:
        - sh
        - -c
        - |
          cat >/etc/mysql/conf.d/z-replication.cnf <<'EOF'
          [mariadb]
          port=3307
          bind-address=0.0.0.0
          server_id=102
          log_bin=mysql-bin
          relay_log=relay-bin
          log_slave_updates=ON
          read_only=ON
          skip_name_resolve=ON
          EOF
          exec docker-entrypoint.sh mariadbd
      volumeMounts:
        - mountPath: /var/lib/mysql
          name: mariadb-replication-replica1-data
    - name: mariadb-replication-replica-2
      image: __MARIADB_IMAGE__
      ports:
        - containerPort: 3308
          hostPort: 3319
      env:
        - name: MARIADB_ROOT_PASSWORD
          value: rootpass
      command:
        - sh
        - -c
        - |
          cat >/etc/mysql/conf.d/z-replication.cnf <<'EOF'
          [mariadb]
          port=3308
          bind-address=0.0.0.0
          server_id=103
          log_bin=mysql-bin
          relay_log=relay-bin
          log_slave_updates=ON
          read_only=ON
          skip_name_resolve=ON
          EOF
          exec docker-entrypoint.sh mariadbd
      volumeMounts:
        - mountPath: /var/lib/mysql
          name: mariadb-replication-replica2-data
    - name: mariadb-replication-bootstrap-1
      image: __MARIADB_IMAGE__
      command:
        - sh
        - -c
        - |
          for port in 3306 3307 3308; do
            until mariadb -h127.0.0.1 -P"${port}" -uroot -prootpass -e 'SELECT 1' >/dev/null 2>&1; do
              sleep 2
            done
          done
          mariadb -h127.0.0.1 -P3306 -uroot -prootpass <<'EOF'
          CREATE USER IF NOT EXISTS 'repl'@'%' IDENTIFIED BY 'replpass';
          GRANT REPLICATION SLAVE, REPLICATION CLIENT ON *.* TO 'repl'@'%';
          CREATE USER IF NOT EXISTS 'appuser'@'%' IDENTIFIED BY 'apppass';
          GRANT ALL PRIVILEGES ON appdb.* TO 'appuser'@'%';
          FLUSH PRIVILEGES;
          EOF
          master_log_file="$(mariadb -h127.0.0.1 -P3306 -uroot -prootpass -Nse 'SHOW MASTER STATUS' | awk '{print $1}')"
          master_log_pos="$(mariadb -h127.0.0.1 -P3306 -uroot -prootpass -Nse 'SHOW MASTER STATUS' | awk '{print $2}')"
          for port in 3307 3308; do
            mariadb -h127.0.0.1 -P"${port}" -uroot -prootpass -e 'STOP SLAVE;' >/dev/null 2>&1 || true
            mariadb -h127.0.0.1 -P"${port}" -uroot -prootpass -e 'RESET SLAVE ALL;' >/dev/null 2>&1 || true
            mariadb -h127.0.0.1 -P"${port}" -uroot -prootpass -e "CHANGE MASTER TO MASTER_HOST='127.0.0.1', MASTER_PORT=3306, MASTER_USER='repl', MASTER_PASSWORD='replpass', MASTER_LOG_FILE='${master_log_file}', MASTER_LOG_POS=${master_log_pos}; START SLAVE;"
          done
          sleep infinity
  volumes:
    - name: mariadb-replication-master-data
      hostPath:
        path: __ROOT_DIR__/volumes/mariadb-replication/master
        type: DirectoryOrCreate
    - name: mariadb-replication-replica1-data
      hostPath:
        path: __ROOT_DIR__/volumes/mariadb-replication/replica1
        type: DirectoryOrCreate
    - name: mariadb-replication-replica2-data
      hostPath:
        path: __ROOT_DIR__/volumes/mariadb-replication/replica2
        type: DirectoryOrCreate
