apiVersion: v1
kind: Pod
metadata:
  name: mariadb-galera
  labels:
    app: mariadb-galera
spec:
  restartPolicy: Always
  containers:
    - name: mariadb-galera-node-1
      image: __MARIADB_IMAGE__
      ports:
        - containerPort: 3306
          hostPort: 3336
      env:
        - name: MARIADB_ROOT_PASSWORD
          value: rootpass
        - name: MARIADB_DATABASE
          value: appdb
      command:
        - sh
        - -c
        - |
          cat >/etc/mysql/conf.d/z-galera.cnf <<'EOF'
          [mariadb]
          port=3306
          bind-address=0.0.0.0
          binlog_format=ROW
          default_storage_engine=InnoDB
          innodb_autoinc_lock_mode=2
          wsrep_on=ON
          wsrep_provider=/usr/lib/galera/libgalera_smm.so
          wsrep_cluster_name=mariadb-galera-lab
          wsrep_cluster_address=gcomm://127.0.0.1:4567,127.0.0.1:4569,127.0.0.1:4571
          wsrep_node_name=node1
          wsrep_node_address=127.0.0.1
          wsrep_sst_method=mariabackup
          wsrep_provider_options="gmcast.listen_addr=tcp://0.0.0.0:4567;ist.recv_addr=127.0.0.1:4568"
          EOF
          exec docker-entrypoint.sh mariadbd --wsrep-new-cluster
      volumeMounts:
        - mountPath: /var/lib/mysql
          name: mariadb-galera-node1-data
    - name: mariadb-galera-node-2
      image: __MARIADB_IMAGE__
      ports:
        - containerPort: 3307
          hostPort: 3337
      env:
        - name: MARIADB_ROOT_PASSWORD
          value: rootpass
      command:
        - sh
        - -c
        - |
          cat >/etc/mysql/conf.d/z-galera.cnf <<'EOF'
          [mariadb]
          port=3307
          bind-address=0.0.0.0
          binlog_format=ROW
          default_storage_engine=InnoDB
          innodb_autoinc_lock_mode=2
          wsrep_on=ON
          wsrep_provider=/usr/lib/galera/libgalera_smm.so
          wsrep_cluster_name=mariadb-galera-lab
          wsrep_cluster_address=gcomm://127.0.0.1:4567,127.0.0.1:4569,127.0.0.1:4571
          wsrep_node_name=node2
          wsrep_node_address=127.0.0.1
          wsrep_sst_method=mariabackup
          wsrep_provider_options="gmcast.listen_addr=tcp://0.0.0.0:4569;ist.recv_addr=127.0.0.1:4570"
          EOF
          exec docker-entrypoint.sh mariadbd
      volumeMounts:
        - mountPath: /var/lib/mysql
          name: mariadb-galera-node2-data
    - name: mariadb-galera-node-3
      image: __MARIADB_IMAGE__
      ports:
        - containerPort: 3308
          hostPort: 3338
      env:
        - name: MARIADB_ROOT_PASSWORD
          value: rootpass
      command:
        - sh
        - -c
        - |
          cat >/etc/mysql/conf.d/z-galera.cnf <<'EOF'
          [mariadb]
          port=3308
          bind-address=0.0.0.0
          binlog_format=ROW
          default_storage_engine=InnoDB
          innodb_autoinc_lock_mode=2
          wsrep_on=ON
          wsrep_provider=/usr/lib/galera/libgalera_smm.so
          wsrep_cluster_name=mariadb-galera-lab
          wsrep_cluster_address=gcomm://127.0.0.1:4567,127.0.0.1:4569,127.0.0.1:4571
          wsrep_node_name=node3
          wsrep_node_address=127.0.0.1
          wsrep_sst_method=mariabackup
          wsrep_provider_options="gmcast.listen_addr=tcp://0.0.0.0:4571;ist.recv_addr=127.0.0.1:4572"
          EOF
          exec docker-entrypoint.sh mariadbd
      volumeMounts:
        - mountPath: /var/lib/mysql
          name: mariadb-galera-node3-data
  volumes:
    - name: mariadb-galera-node1-data
      hostPath:
        path: __ROOT_DIR__/volumes/mariadb-galera/node1
        type: DirectoryOrCreate
    - name: mariadb-galera-node2-data
      hostPath:
        path: __ROOT_DIR__/volumes/mariadb-galera/node2
        type: DirectoryOrCreate
    - name: mariadb-galera-node3-data
      hostPath:
        path: __ROOT_DIR__/volumes/mariadb-galera/node3
        type: DirectoryOrCreate
