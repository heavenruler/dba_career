apiVersion: v1
kind: Pod
metadata:
  name: mysql-group-replication
  labels:
    app: mysql-group-replication
spec:
  restartPolicy: Always
  containers:
    - name: mysql-group-replication-node-1
      image: __MYSQL_IMAGE__
      ports:
        - containerPort: 3306
          hostPort: 3320
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpass
        - name: MYSQL_ROOT_HOST
          value: "%"
        - name: MYSQL_DATABASE
          value: appdb
      command:
        - sh
        - -c
        - |
          cat >/etc/mysql/conf.d/z-group-replication.cnf <<'EOF'
          [mysqld]
          port=3306
          bind-address=0.0.0.0
          server-id=21
          log_bin=mysql-bin
          binlog_format=ROW
          gtid_mode=ON
          enforce_gtid_consistency=ON
          loose-group_replication_group_name=aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
          loose-group_replication_start_on_boot=OFF
          loose-group_replication_local_address=127.0.0.1:13306
          loose-group_replication_group_seeds=127.0.0.1:13306,127.0.0.1:13307
          loose-group_replication_bootstrap_group=OFF
          loose-group_replication_single_primary_mode=ON
          loose-group_replication_enforce_update_everywhere_checks=OFF
          loose-group_replication_ip_allowlist=127.0.0.1/8
          loose-group_replication_ssl_mode=DISABLED
          loose-group_replication_recovery_get_public_key=ON
          plugin_load_add=group_replication.so
          mysqlx=OFF
          report_host=127.0.0.1
          skip-name-resolve
          EOF
          exec docker-entrypoint.sh mysqld
      volumeMounts:
        - mountPath: /var/lib/mysql
          name: mysql-group-replication-node1-data
    - name: mysql-group-replication-node-2
      image: __MYSQL_IMAGE__
      ports:
        - containerPort: 3307
          hostPort: 3321
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpass
        - name: MYSQL_ROOT_HOST
          value: "%"
      command:
        - sh
        - -c
        - |
          cat >/etc/mysql/conf.d/z-group-replication.cnf <<'EOF'
          [mysqld]
          port=3307
          bind-address=0.0.0.0
          server-id=22
          log_bin=mysql-bin
          relay_log=relay-bin
          binlog_format=ROW
          gtid_mode=ON
          enforce_gtid_consistency=ON
          loose-group_replication_group_name=aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
          loose-group_replication_start_on_boot=OFF
          loose-group_replication_local_address=127.0.0.1:13307
          loose-group_replication_group_seeds=127.0.0.1:13306,127.0.0.1:13307
          loose-group_replication_bootstrap_group=OFF
          loose-group_replication_single_primary_mode=ON
          loose-group_replication_enforce_update_everywhere_checks=OFF
          loose-group_replication_ip_allowlist=127.0.0.1/8
          loose-group_replication_ssl_mode=DISABLED
          loose-group_replication_recovery_get_public_key=ON
          plugin_load_add=group_replication.so
          mysqlx=OFF
          report_host=127.0.0.1
          skip-name-resolve
          EOF
          exec docker-entrypoint.sh mysqld
      volumeMounts:
        - mountPath: /var/lib/mysql
          name: mysql-group-replication-node2-data
    - name: mysql-group-replication-node-3
      image: __MYSQL_IMAGE__
      ports:
        - containerPort: 3308
          hostPort: 3322
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpass
        - name: MYSQL_ROOT_HOST
          value: "%"
      command:
        - sh
        - -c
        - |
          cat >/etc/mysql/conf.d/z-group-replication.cnf <<'EOF'
          [mysqld]
          port=3308
          bind-address=0.0.0.0
          server-id=23
          log_bin=mysql-bin
          relay_log=relay-bin
          binlog_format=ROW
          gtid_mode=ON
          enforce_gtid_consistency=ON
          loose-group_replication_group_name=aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
          loose-group_replication_start_on_boot=OFF
          loose-group_replication_local_address=127.0.0.1:13308
          loose-group_replication_group_seeds=127.0.0.1:13306,127.0.0.1:13307
          loose-group_replication_bootstrap_group=OFF
          loose-group_replication_single_primary_mode=ON
          loose-group_replication_enforce_update_everywhere_checks=OFF
          loose-group_replication_ip_allowlist=127.0.0.1/8
          loose-group_replication_ssl_mode=DISABLED
          loose-group_replication_recovery_get_public_key=ON
          plugin_load_add=group_replication.so
          mysqlx=OFF
          report_host=127.0.0.1
          skip-name-resolve
          EOF
          exec docker-entrypoint.sh mysqld
      volumeMounts:
        - mountPath: /var/lib/mysql
          name: mysql-group-replication-node3-data
    - name: mysql-group-replication-bootstrap-1
      image: __MYSQL_IMAGE__
      command:
        - sh
        - -c
        - |
          for port in 3306 3307 3308; do
            until mysql -h127.0.0.1 -P"${port}" -uroot -prootpass -e 'SELECT 1' >/dev/null 2>&1; do
              sleep 2
            done
          done
          for port in 3306 3307 3308; do
            mysql -h127.0.0.1 -P"${port}" -uroot -prootpass -e "INSTALL PLUGIN group_replication SONAME 'group_replication.so';" >/dev/null 2>&1 || true
          done
          mysql -h127.0.0.1 -P3306 -uroot -prootpass <<'EOF'
          CREATE USER IF NOT EXISTS 'repl'@'%' IDENTIFIED BY 'replpass';
          GRANT REPLICATION SLAVE ON *.* TO 'repl'@'%';
          GRANT CONNECTION_ADMIN, BACKUP_ADMIN, GROUP_REPLICATION_STREAM ON *.* TO 'repl'@'%';
          CREATE USER IF NOT EXISTS 'appuser'@'%' IDENTIFIED BY 'apppass';
          GRANT ALL PRIVILEGES ON appdb.* TO 'appuser'@'%';
          FLUSH PRIVILEGES;
          EOF
          for port in 3307 3308; do
            mysql -h127.0.0.1 -P"${port}" -uroot -prootpass -e 'RESET MASTER;' >/dev/null 2>&1 || mysql -h127.0.0.1 -P"${port}" -uroot -prootpass -e 'RESET BINARY LOGS AND GTIDS;' >/dev/null 2>&1 || true
          done
          for port in 3306 3307 3308; do
            mysql -h127.0.0.1 -P"${port}" -uroot -prootpass -e "CHANGE REPLICATION SOURCE TO SOURCE_USER='repl', SOURCE_PASSWORD='replpass' FOR CHANNEL 'group_replication_recovery';"
          done
          for port in 3306 3307 3308; do
            mysql -h127.0.0.1 -P"${port}" -uroot -prootpass -e "SET PERSIST group_replication_start_on_boot=ON;" >/dev/null 2>&1 || true
          done
          mysql -h127.0.0.1 -P3306 -uroot -prootpass -e "SET GLOBAL group_replication_bootstrap_group=ON; START GROUP_REPLICATION; SET GLOBAL group_replication_bootstrap_group=OFF;"
          sleep 5
          mysql -h127.0.0.1 -P3307 -uroot -prootpass -e "START GROUP_REPLICATION;"
          until mysql -h127.0.0.1 -P3306 -uroot -prootpass -Nse "SELECT COUNT(*) FROM performance_schema.replication_group_members WHERE MEMBER_STATE='ONLINE';" | grep -q '^2$'; do
            sleep 2
          done
          sleep infinity
  volumes:
    - name: mysql-group-replication-node1-data
      hostPath:
        path: __ROOT_DIR__/volumes/mysql-group-replication/node1
        type: DirectoryOrCreate
    - name: mysql-group-replication-node2-data
      hostPath:
        path: __ROOT_DIR__/volumes/mysql-group-replication/node2
        type: DirectoryOrCreate
    - name: mysql-group-replication-node3-data
      hostPath:
        path: __ROOT_DIR__/volumes/mysql-group-replication/node3
        type: DirectoryOrCreate
