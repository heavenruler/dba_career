db: tidb
topology: k8s-3node-haproxy-3s3r-unlimit
phase_env:
  PHASE_NAME: phase-k8s
  RESULT_SCOPE: S-K8S
  BASELINE_ELIGIBLE: true
  BASELINE_FAMILY: k8s
  tuning_profile_id: default
k8s:
  namespace: tidb-cluster
  cluster_name: tidb-poc
  pod_replicas:
    pd: 3
    tidb: 2
    tikv: 3
  resource_limits: null
  storage_class: local-path
  pv_size:
    pd: 10Gi
    tikv: 100Gi
  db_image_prefix: pingcap/tidb
db_config:
  tidb_version: v8.5.2
  tikv_readpool_unified_auto_adjust_pool_size: false
  pd_max_replicas: 3
workload:
  warehouses: 128
  threads_list: [16, 32, 64, 128]
  rounds: 5
  warmup_threads: 64
  warmup_sec: 1200
  run_sec: 300
isolation:
  level: READ-COMMITTED
  txn_mode: pessimistic
network:
  nodeport: 30004
  client_proto: mysql
  haproxy_backends: 0
split:
  strategy: tidb_explicit_9table
  source_ref: tests/common/prepare.sh:134-144
  expected_tables: 9
  expected_shards_per_table: 3
