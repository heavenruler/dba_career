# expected.yaml SSOT — TiDB-limit
db: tidb
topology: k8s-3node-haproxy-3s3r-limit
phase_env:
  PHASE_NAME: phase-k8s
  RESULT_SCOPE: S-K8S
  BASELINE_ELIGIBLE: true
  BASELINE_FAMILY: k8s
  tuning_profile_id: default
k8s:
  namespace: tidb-cluster
  cluster_name: tidb-poc
  pod_replicas:
    pd: 3
    sql: 2
    storage: 3
  resource_limits:                       # dump picks STORAGE (tikv) container limits
    cpu: "2"
    memory: 8Gi
  storage_class: local-path
  pv_size:
    pd: 10Gi
    storage: 100Gi
  db_image_prefix: pingcap/tidb
db_config:
  tidb_version: v8.5.2
  tikv_readpool_unified_auto_adjust_pool_size: false
  pd_max_replicas: 3
workload:
  warehouses: 128
  threads_list: [16, 32, 64, 128]
  rounds: 5
  warmup_threads: 64
  warmup_sec: 1200
  run_sec: 300
isolation:
  level: READ-COMMITTED
  txn_mode: pessimistic
network:
  nodeport: 30004
  client_proto: mysql
  haproxy_backends: 0
