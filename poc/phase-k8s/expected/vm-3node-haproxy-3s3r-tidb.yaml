# VM baseline SSOT — TiDB @ vm-3node-haproxy-3s3r-rc
# Schema v2 — split section retained (VM baseline has prepare info).
# compare-vm classifies .split.* as ALLOW (dry-run vs VM-with-prepare asymmetry).
db: tidb
topology: vm-3node-haproxy-3s3r
phase_env:
  PHASE_NAME: phase-baseline
  RESULT_SCOPE: S-BASE
  BASELINE_ELIGIBLE: true
  BASELINE_FAMILY: vm
  tuning_profile_id: default
vm:
  nodes: 3
  per_node:
    pd: 1
    sql: 1
    storage: 1
db_config:
  tidb_version: v8.5.2
  tikv_readpool_unified_auto_adjust_pool_size: false
  pd_max_replicas: 3
workload:
  warehouses: 128
  threads_list: [16, 32, 64, 128]
  rounds: 5
  warmup_threads: 64
  warmup_sec: 1200
  run_sec: 300
isolation:
  level: READ-COMMITTED
  txn_mode: pessimistic
network:
  haproxy_backends: 3
  haproxy_port: 4000
  client_proto: mysql
split:
  strategy: tidb_explicit_9table
  source_ref: tests/common/prepare.sh:134-144
  expected_tables: 9
  expected_shards_per_table: 3
