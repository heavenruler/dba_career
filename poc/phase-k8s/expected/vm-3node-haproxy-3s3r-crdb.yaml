# VM baseline SSOT — CRDB @ vm-3node-haproxy-3s3r-rc
db: crdb
topology: vm-3node-haproxy-3s3r
phase_env:
  PHASE_NAME: phase-baseline
  RESULT_SCOPE: S-BASE
  BASELINE_ELIGIBLE: true
  BASELINE_FAMILY: vm
  tuning_profile_id: default
vm:
  nodes: 3
  per_node:
    sql: 1                                 # cockroach binary 同時 sql + storage
    storage: 1
db_config:
  crdb_version: v26.1.4
  default_transaction_isolation: "read committed"
  kv_range_split_by_load_enabled: false
workload:
  warehouses: 128
  threads_list: [16, 32, 64, 128]
  rounds: 5
  warmup_threads: 64
  warmup_sec: 1200
  run_sec: 300
isolation:
  level: "read committed"
network:
  haproxy_backends: 3
  haproxy_port: 4000
  client_proto: postgres
split:
  strategy: crdb_auto_range_split
  expected_tables: 9
  expected_shards_per_table: 3
