# phase-k8s vars: TiDB-limit @ k8s-3node-haproxy-3s3r-limit
tidb_version: "v8.5.2"
k8s_resource_limits: true            # limit cell — pod resource.limits set
tidb_k8s_namespace: tidb-cluster
tidb_k8s_cluster_name: tidb-poc
tidb_sql_nodeport: 30004
tidb_replicas:
  pd: 3
  tidb: 3       # strict 3s3r alignment (3 TiDB compute pods, mirror vm-3node-haproxy-3s3r)
  tikv: 3
tidb_storage:
  pd: 10Gi
  tikv: 100Gi
  storageClassName: local-path
tidb_resources:
  pd:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "1",  memory: 2Gi }
  tidb:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "1",  memory: 3Gi }
  tikv:
    requests: { cpu: "1",  memory: 4Gi }
    limits:   { cpu: "2",  memory: 8Gi }

phase_name: phase-k8s
result_scope: S-K8S
baseline_eligible: true
baseline_family: k8s
tuning_profile_id: default
topology: k8s-3node-haproxy-3s3r-limit
