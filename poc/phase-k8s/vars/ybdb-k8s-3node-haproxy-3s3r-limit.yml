# phase-k8s vars: YBDB-limit @ k8s-3node-haproxy-3s3r-limit
yb_operator_version: "2025.2.2"
yb_resource_limits: true             # limit cell
yb_namespace: yb-demo
yb_ysql_nodeport: 30005
yb_ycql_nodeport: 30006
yb_replicas:
  master: 3
  tserver: 3
yb_storage:
  master:
    size: 10Gi
    storageClass: local-path
  tserver:
    size: 50Gi
    storageClass: local-path
yb_resources:
  master:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "1",  memory: 2Gi }
  tserver:
    requests: { cpu: "1",  memory: 2Gi }
    limits:   { cpu: "2",  memory: 8Gi }
yb_gflags:
  master:
    replication_factor: "3"
    enable_automatic_tablet_splitting: "false"
  tserver:
    ysql_enable_auth: "false"
    yb_enable_read_committed_isolation: "true"
    enable_automatic_tablet_splitting: "false"

phase_name: phase-k8s
result_scope: S-K8S
baseline_eligible: true
baseline_family: k8s
tuning_profile_id: default
topology: k8s-3node-haproxy-3s3r-limit
