---
- name: Gather facts from all YugabyteDB nodes
  hosts: yb_cluster
  become: true
  gather_facts: true

- name: Deploy YugabyteDB cluster
  hosts: yb_cluster
  become: true
  vars:
    yb_version: "2025.2.2.2"
    yb_download_url: "https://software.yugabyte.com/releases/2025.2.2.2/yugabyte-2025.2.2.2-b11-linux-x86_64.tar.gz"
    yb_cloud: "poc"
    yb_region: "poc-region"
    yb_bootstrap_ip: "172.24.40.32"
    yb_master_addresses: "172.24.40.32:7100,172.24.40.33:7100,10.160.152.11:7100"
    yb_rf: 3
    yb_placement: "poc.poc-region.idc:2,poc.poc-region.gcp:1"
  roles:
    - yugabyte_deploy
