---
- name: Gather facts from all YugabyteDB nodes
  hosts: yb_cluster
  become: true
  gather_facts: true

- name: Deploy YugabyteDB cluster
  hosts: yb_cluster
  become: true
  vars:
    yb_version: "2.20.1.3"
    yb_download_url: "https://downloads.yugabyte.com/releases/2.20.1.3/yugabyte-2.20.1.3-b3-linux-x86_64.tar.gz"
    yb_cloud: "poc"
    yb_region: "poc-region"
    yb_bootstrap_ip: "172.24.40.32"
    yb_master_addresses: "172.24.40.32:7100,172.24.40.33:7100,10.160.152.11:7100"
  roles:
    - yugabyte_deploy
