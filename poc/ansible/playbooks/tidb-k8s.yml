---
- name: Gather facts from k3s cluster nodes
  hosts: k3s_cluster
  become: true
  gather_facts: true

- name: Deploy TiDB via TiDB Operator on K8s
  hosts: tidb_k8s_control
  become: true
  vars:
    tidb_version: "v8.5.2"
    tidb_operator_version: "v1.6.0"
    k8s_resource_limits: false   # override with -e k8s_resource_limits=true for K8s-limit round
  roles:
    - tidb_k8s_deploy
