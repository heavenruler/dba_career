---
- name: TiDB init password & status check
  hosts: tidb_control
  become: true
  vars:
    tidb_host: 172.24.40.32
    tidb_port: 4000
    tidb_user: root
    tiup_bin: /root/.tiup/bin/tiup
    cluster_name: tidb-poc

  tasks:
    ## Install mysql client if not present
    - name: Ensure mysql client installed
      ansible.builtin.dnf:
        name: mariadb
        state: present

    ## Clear root password (idempotent — works whether current password is set or empty)
    - name: Clear root password
      ansible.builtin.shell: |
        mysql -h {{ tidb_host }} -P {{ tidb_port }} -u {{ tidb_user }} \
          -e "ALTER USER 'root'@'%' IDENTIFIED BY '';" 2>/dev/null || true
      changed_when: true

    ## Status checks
    - name: "[1] TiUP cluster display"
      ansible.builtin.shell: |
        {{ tiup_bin }} cluster display {{ cluster_name }}
      environment:
        PATH: "/root/.tiup/bin:{{ ansible_env.PATH }}"
      register: r_display
      changed_when: false

    - name: "[2] TiDB version"
      ansible.builtin.shell: |
        mysql -e "SELECT tidb_version()\G"
      register: r_version
      changed_when: false

    - name: "[3] Cluster status"
      ansible.builtin.shell: |
        mysql -e "SHOW STATUS LIKE 'uptime';"
      register: r_status
      changed_when: false

    - name: "[4] Database list"
      ansible.builtin.shell: |
        mysql -e "SHOW DATABASES;"
      register: r_dblist
      changed_when: false

    - name: "[5] Store engines"
      ansible.builtin.shell: |
        mysql -e "SHOW ENGINES;"
      register: r_engines
      changed_when: false

    ## Report
    - name: "=== STATUS REPORT ==="
      ansible.builtin.debug:
        msg:
          - "--- [1] Cluster Display ---"
          - "{{ r_display.stdout_lines }}"
          - "--- [2] TiDB Version ---"
          - "{{ r_version.stdout_lines }}"
          - "--- [3] Uptime ---"
          - "{{ r_status.stdout_lines }}"
          - "--- [4] Databases ---"
          - "{{ r_dblist.stdout_lines }}"
          - "--- [5] Engines ---"
          - "{{ r_engines.stdout_lines }}"
