---
- name: Install k3s server (control plane + worker)
  hosts: k3s_server
  become: true
  vars:
    k3s_proxy: "http://sproxy.104-dev.com.tw:3128"
    k3s_no_proxy: "172.24.40.32,172.24.40.33,172.24.40.34,10.42.0.0/16,10.43.0.0/16,127.0.0.1,localhost,.svc,.cluster.local,kubernetes"
  roles:
    - k3s_server

- name: Install k3s agents (workers)
  hosts: k3s_agent
  become: true
  vars:
    k3s_proxy: "http://sproxy.104-dev.com.tw:3128"
    k3s_no_proxy: "172.24.40.32,172.24.40.33,172.24.40.34,10.42.0.0/16,10.43.0.0/16,127.0.0.1,localhost,.svc,.cluster.local,kubernetes"
  roles:
    - k3s_agent

- name: Verify cluster node status
  hosts: k3s_server
  become: true
  tasks:
    - name: Get all nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: r_nodes
      changed_when: false

    - name: Show cluster nodes
      ansible.builtin.debug:
        msg: "{{ r_nodes.stdout_lines }}"
