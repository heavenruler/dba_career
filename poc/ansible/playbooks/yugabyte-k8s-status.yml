---
- name: Show YugabyteDB K8s cluster status
  hosts: k3s_server
  become: true
  tasks:
    - name: Get k3s nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: r_nodes
      changed_when: false

    - name: "[K8s] Nodes"
      ansible.builtin.debug:
        msg: "{{ r_nodes.stdout_lines }}"

    - name: Get pods in yb-demo
      ansible.builtin.command: >
        k3s kubectl get pods -n yb-demo -o wide
      register: r_pods
      changed_when: false

    - name: "[K8s] Pods"
      ansible.builtin.debug:
        msg: "{{ r_pods.stdout_lines }}"

    - name: Get services
      ansible.builtin.command: >
        k3s kubectl get svc -n yb-demo
      register: r_svc
      changed_when: false

    - name: "[K8s] Services / NodePorts"
      ansible.builtin.debug:
        msg: "{{ r_svc.stdout_lines }}"

    - name: Show YSQL endpoint
      ansible.builtin.debug:
        msg: "YSQL endpoint: psql -h {{ ansible_default_ipv4.address }} -p 30005 -U yugabyte yugabyte"
