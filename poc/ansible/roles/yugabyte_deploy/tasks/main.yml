---
## User & directories
- name: Create yugabyte user
  ansible.builtin.user:
    name: yugabyte
    shell: /bin/bash
    create_home: true

- name: Create YugabyteDB directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: yugabyte
    group: yugabyte
    mode: '0755'
  loop:
    - /opt/yugabyte
    - /opt/yugabyte/data
    - /opt/yugabyte/logs

## Download & install
- name: Download YugabyteDB tarball
  ansible.builtin.shell: |
    curl -4 -fSL \
      --proxy "{{ yb_proxy | default('') }}" \
      -o /tmp/yugabyte-{{ yb_version }}.tar.gz \
      "{{ yb_download_url }}"
  args:
    creates: "/tmp/yugabyte-{{ yb_version }}.tar.gz"

- name: Extract YugabyteDB
  ansible.builtin.unarchive:
    src: "/tmp/yugabyte-{{ yb_version }}.tar.gz"
    dest: /opt/yugabyte
    remote_src: true
    extra_opts: [--strip-components=1]
    creates: /opt/yugabyte/bin/yugabyted
    owner: yugabyte
    group: yugabyte

- name: Run post-install script
  ansible.builtin.command: /opt/yugabyte/bin/post_install.sh
  args:
    creates: /opt/yugabyte/.post_install_done
  become_user: yugabyte
  failed_when: false

## python requirements (yugabyted requires `python` + distutils)
- name: Install python3 dependencies for yugabyted/ycqlsh
  ansible.builtin.command: dnf install -y python3-setuptools python3-six python3-pip
  register: _dnf_out
  changed_when: "'Nothing to do' not in _dnf_out.stdout"

- name: Install cassandra-driver for ycqlsh (Python 3.12 compatible)
  ansible.builtin.pip:
    name: "cassandra-driver>=3.28"
    executable: pip3
    extra_args: "--proxy {{ yb_proxy | default('') }}"
  failed_when: false

- name: Create python symlink for yugabyted
  ansible.builtin.file:
    src: /usr/bin/python3.8
    dest: /usr/bin/python
    state: link
    force: true

- name: Set python3 alternatives to python3.8 for yugabyted
  ansible.builtin.command: alternatives --set python3 /usr/bin/python3.8
  failed_when: false
  changed_when: false

- name: Replace bundled six with Python 3.12 compatible version
  ansible.builtin.shell: |
    python3 -c "
    import zipfile, six
    z = zipfile.ZipFile('/opt/yugabyte/lib/six-1.16.0-py3-none-any.zip', 'w')
    z.write(six.__file__, 'six.py')
    z.close()
    "
  args:
    creates: /opt/yugabyte/lib/six-1.16.0-py3-none-any.zip

## Bootstrap node
- name: Start yugabyted on bootstrap node
  ansible.builtin.shell: |
    /opt/yugabyte/bin/yugabyted start \
      --advertise_address={{ yb_actual_ip }} \
      --cloud_location={{ yb_cloud }}.{{ yb_region }}.{{ yb_zone }} \
      --fault_tolerance=zone \
      --data_dir=/opt/yugabyte/data \
      --log_dir=/opt/yugabyte/logs \
      --tserver_flags="yb_enable_read_committed_isolation=true" \
      --ui=false \
      --daemon=true
  become_user: yugabyte
  args:
    creates: /opt/yugabyte/data/yugabyted.pid
  when: inventory_hostname in groups['yb_bootstrap']

- name: Wait for bootstrap node to be ready
  ansible.builtin.wait_for:
    host: "{{ yb_actual_ip }}"
    port: 7000
    timeout: 120
  when: inventory_hostname in groups['yb_bootstrap']

## Join nodes
- name: Start yugabyted on join nodes
  ansible.builtin.shell: |
    /opt/yugabyte/bin/yugabyted start \
      --advertise_address={{ yb_actual_ip }} \
      --cloud_location={{ yb_cloud }}.{{ yb_region }}.{{ yb_zone }} \
      --fault_tolerance=zone \
      --join={{ yb_bootstrap_ip }} \
      --data_dir=/opt/yugabyte/data \
      --log_dir=/opt/yugabyte/logs \
      --tserver_flags="yb_enable_read_committed_isolation=true" \
      --ui=false \
      --daemon=true
  become_user: yugabyte
  args:
    creates: /opt/yugabyte/data/yugabyted.pid
  when: inventory_hostname in groups['yb_join']

## Placement policy (run once on bootstrap)
- name: Set placement policy
  ansible.builtin.shell: |
    /opt/yugabyte/bin/yb-admin \
      --master_addresses {{ yb_master_addresses }} \
      modify_placement_info \
      {{ yb_placement }} {{ yb_rf }}
  become_user: yugabyte
  run_once: true
  when: inventory_hostname in groups['yb_bootstrap']
