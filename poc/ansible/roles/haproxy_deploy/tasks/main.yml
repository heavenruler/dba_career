---
- name: Install haproxy
  ansible.builtin.command: dnf install -y haproxy
  register: _dnf_out
  changed_when: "'Nothing to do' not in _dnf_out.stdout"

- name: Configure haproxy
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
  notify: restart haproxy

- name: Start and enable haproxy
  ansible.builtin.service:
    name: haproxy
    state: started
    enabled: true

- name: Show haproxy listen address
  ansible.builtin.debug:
    msg: "HAProxy ready: {{ inventory_hostname }}:{{ haproxy_port | default(4000) }} → {{ haproxy_backends }}"
