---
- name: Install haproxy
  ansible.builtin.dnf:
    name: haproxy
    state: present

- name: Configure haproxy
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
  notify: restart haproxy

- name: Start and enable haproxy
  ansible.builtin.service:
    name: haproxy
    state: started
    enabled: true

- name: Show haproxy listen address
  ansible.builtin.debug:
    msg: "HAProxy ready: {{ ansible_default_ipv4.address }}:4000 → {{ haproxy_backends }}"
