---
- name: Create data dir for TiKV / PV
  ansible.builtin.file:
    path: /opt/tidb/data
    state: directory
    mode: '0755'

## AlmaLinux 10 uses nftables; ensure iptables kernel modules are loaded
- name: Install iptables for k3s/kube-proxy
  ansible.builtin.dnf:
    name: iptables
    state: present

- name: Load required iptables kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - ip_tables
    - iptable_nat
    - iptable_filter
    - nf_nat

- name: Persist iptables modules on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s-iptables.conf
    content: |
      ip_tables
      iptable_nat
      iptable_filter
      nf_nat
    mode: '0644'

## Uninstall existing k3s-agent if present
- name: Check if k3s-agent-uninstall script exists
  ansible.builtin.stat:
    path: /usr/local/bin/k3s-agent-uninstall.sh
  register: k3s_agent_uninstall

- name: Uninstall previous k3s-agent installation
  ansible.builtin.shell: /usr/local/bin/k3s-agent-uninstall.sh
  when: k3s_agent_uninstall.stat.exists
  changed_when: true

- name: Fetch k3s node token from server
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw
  delegate_to: "{{ groups['k3s_server'][0] }}"

- name: Create systemd override dir for k3s-agent
  ansible.builtin.file:
    path: /etc/systemd/system/k3s-agent.service.d
    state: directory
    mode: '0755'

- name: Create systemd proxy override for k3s-agent (image pull)
  ansible.builtin.copy:
    dest: /etc/systemd/system/k3s-agent.service.d/proxy.conf
    content: |
      [Service]
      Environment="HTTP_PROXY={{ k3s_proxy }}"
      Environment="HTTPS_PROXY={{ k3s_proxy }}"
      Environment="NO_PROXY={{ k3s_no_proxy }}"
    mode: '0644'
  notify: restart k3s-agent

- name: Install k3s agent
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_VERSION: "v1.29.14+k3s1"
    K3S_URL: "https://{{ hostvars[groups['k3s_server'][0]]['ansible_default_ipv4']['address'] }}:6443"
    K3S_TOKEN: "{{ k3s_token_raw.content | b64decode | trim }}"
    HTTPS_PROXY: "{{ k3s_proxy }}"
    NO_PROXY: "{{ k3s_no_proxy }}"

- name: Wait for agent to join cluster
  ansible.builtin.command: >
    k3s kubectl get node {{ ansible_hostname }} --no-headers
  delegate_to: "{{ groups['k3s_server'][0] }}"
  register: node_status
  until: "'Ready' in node_status.stdout"
  retries: 24
  delay: 5
  changed_when: false
