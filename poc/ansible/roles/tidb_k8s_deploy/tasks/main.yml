---
## Helm
- name: Install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  environment:
    HTTPS_PROXY: "http://sproxy.104-dev.com.tw:3128"

## TiDB Operator CRDs
- name: Apply TiDB Operator CRDs
  ansible.builtin.shell: |
    k3s kubectl apply --server-side -f \
      https://raw.githubusercontent.com/pingcap/tidb-operator/{{ tidb_operator_version }}/manifests/crd.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    HTTPS_PROXY: "http://sproxy.104-dev.com.tw:3128"
    NO_PROXY: "172.24.0.0/16,10.0.0.0/8,127.0.0.1,localhost,.svc,.cluster.local,10.42.0.0/16,10.43.0.0/16"
  changed_when: true

## TiDB Operator
- name: Add pingcap Helm repo
  ansible.builtin.shell: |
    helm repo add pingcap https://charts.pingcap.org/ && helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    HTTPS_PROXY: "http://sproxy.104-dev.com.tw:3128"
  changed_when: true

- name: Install TiDB Operator
  ansible.builtin.shell: |
    helm upgrade --install tidb-operator pingcap/tidb-operator \
      --namespace tidb-admin \
      --create-namespace \
      --version {{ tidb_operator_version }} \
      --wait --timeout 5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    HTTPS_PROXY: "http://sproxy.104-dev.com.tw:3128"
    NO_PROXY: "172.24.0.0/16,10.0.0.0/8,127.0.0.1,localhost,.svc,.cluster.local,10.42.0.0/16,10.43.0.0/16"
  changed_when: true

## TiDB Cluster namespace
- name: Create tidb namespace
  ansible.builtin.shell: |
    k3s kubectl create namespace tidb --dry-run=client -o yaml | k3s kubectl apply -f -
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: true

## TidbCluster CRD
- name: Render TidbCluster manifest
  ansible.builtin.template:
    src: tidbcluster.yaml.j2
    dest: /root/tidbcluster.yaml
    mode: '0644'

- name: Apply TidbCluster
  ansible.builtin.shell: |
    k3s kubectl apply -f /root/tidbcluster.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: true

## Wait for cluster ready
- name: Wait for TiDB cluster to be ready
  ansible.builtin.shell: |
    k3s kubectl get tidbcluster tidb-poc -n tidb \
      -o jsonpath='{.status.pd.phase}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cluster_phase
  until: cluster_phase.stdout == "Normal"
  retries: 60
  delay: 10
  changed_when: false

- name: Show cluster status
  ansible.builtin.shell: |
    k3s kubectl get pods -n tidb -o wide
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: r_pods
  changed_when: false

- name: "[K8s] TiDB cluster pods"
  ansible.builtin.debug:
    msg: "{{ r_pods.stdout_lines }}"

- name: Show NodePort endpoint
  ansible.builtin.debug:
    msg: "TiDB endpoint: mysql -h {{ ansible_default_ipv4.address }} -P 30004 -u root -p"
