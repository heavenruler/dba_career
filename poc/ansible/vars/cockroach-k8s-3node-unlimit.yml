# CockroachDB S-BASE k8s-3node-unlimit reproduction vars.
# Usage: ansible-playbook -i ansible/inventory/cockroach-tc1-k8s.ini ansible/playbooks/cockroach-k8s.yml -e @ansible/vars/cockroach-k8s-3node-unlimit.yml
helm_version: "v3.16.4"
crdb_chart_version: "15.0.5"
crdb_resource_limits: false

crdb_image_tag: "v26.1.4"
crdb_namespace: cockroach-tc1
crdb_replicas: 3
crdb_sql_nodeport: 30007
crdb_admin_nodeport: 30008

crdb_storage:
  size: 30Gi
  storageClass: local-path

crdb_tls_enabled: false
crdb_read_committed: true
