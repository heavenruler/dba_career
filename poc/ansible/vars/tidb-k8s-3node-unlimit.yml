# TiDB S-BASE k8s-3node-unlimit reproduction vars.
# Usage: ansible-playbook -i ansible/inventory/tidb-tc1-k8s.ini ansible/playbooks/tidb-k8s.yml -e @ansible/vars/tidb-k8s-3node-unlimit.yml
tidb_version: "v8.5.2"
k8s_resource_limits: false

tidb_k8s_namespace: tidb-cluster
tidb_k8s_cluster_name: tidb-poc
tidb_sql_nodeport: 30004

tidb_replicas:
  pd: 3
  tidb: 2
  tikv: 3

tidb_storage:
  pd: 10Gi
  tikv: 100Gi
  storageClassName: local-path
