# YugabyteDB TC4 — Route B (GCP primary)
# master quorum: poc-1(IDC) + gcp-1 + gcp-2(GCP) → GCP 斷線後 IDC fail-closed
# tserver: all 5 nodes (RF=3)
# HAProxy: poc-1(IDC):15433 → poc-1/2/3:5433；gcp-1(GCP):15433 → gcp-1/2:5433
# placement: idc:1,gcp:2  master_addresses: poc-1,gcp-1,gcp-2

[yb_bootstrap]
172.24.40.32 ansible_hostname=l-test-poc-1 yb_zone=idc yb_actual_ip=172.24.40.32 yb_proxy=http://sproxy.104-dev.com.tw:3128

[yb_join]
172.24.40.33 ansible_hostname=l-test-poc-2 yb_zone=idc yb_actual_ip=172.24.40.33 yb_proxy=http://sproxy.104-dev.com.tw:3128
172.24.40.34 ansible_hostname=l-test-poc-3 yb_zone=idc yb_actual_ip=172.24.40.34 yb_proxy=http://sproxy.104-dev.com.tw:3128
g-test-poc-1 yb_zone=gcp yb_actual_ip=10.160.152.11 yb_proxy=http://gproxy.104-dev.com.tw:3128
g-test-poc-2 yb_zone=gcp yb_actual_ip=10.160.152.12 yb_proxy=http://gproxy.104-dev.com.tw:3128

[yb_cluster:children]
yb_bootstrap
yb_join

[haproxy]
172.24.40.32 ansible_hostname=l-test-poc-1 haproxy_port=15433 haproxy_frontend=ysql_idc haproxy_backends="172.24.40.32:5433,172.24.40.33:5433,172.24.40.34:5433"
g-test-poc-1 haproxy_port=15433 haproxy_frontend=ysql_gcp haproxy_backends="10.160.152.11:5433,10.160.152.12:5433"
