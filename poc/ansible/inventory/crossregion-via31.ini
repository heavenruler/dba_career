# Ansible inventory for phase-crossregion VIA .31 CONTROLLER
#
# 來源：crossregion.ini (Mac tunnel-based) 改寫
# 改動：GCP nodes 改用 internal IP 10.160.152.x（不再 Mac IAP tunnel）
# Controller 由 Mac 改為 .31 (IDC client/admin)，因為：
#   - Mac IAP tunnel 易斷導致 ansible UNREACHABLE
#   - IDC↔GCP FW 已開（2026-06-18 申請通過），.31 → 10.160.152.x:22 直連
#   - SSH key 已 prime（earlier session 已推 .31 pubkey）
#
# 使用方式：
#   rsync ansible/ to .31:/tmp/poc-ansible/
#   ssh root@172.24.40.31 'cd /tmp/poc-ansible && ansible-playbook -i inventory/crossregion-via31.ini playbooks/<db>-vm6.yml'

# ============================================================================
# IDC region (3 db nodes; vlan241) — .31 → 172.24.40.x 直連
# ============================================================================
[idc_db]
172.24.40.32 ansible_hostname=idc-dbhost-1 logical_id=idc-dbhost-1 region=idc zone=idc-vlan241 ansible_python_interpreter=/usr/bin/python3.12
172.24.40.33 ansible_hostname=idc-dbhost-2 logical_id=idc-dbhost-2 region=idc zone=idc-vlan241 ansible_python_interpreter=/usr/bin/python3.12
172.24.40.34 ansible_hostname=idc-dbhost-3 logical_id=idc-dbhost-3 region=idc zone=idc-vlan241 ansible_python_interpreter=/usr/bin/python3.12

# ============================================================================
# GCP region (3 db nodes; asia-east1 zone a/b/c) — .31 → 10.160.152.x 直連
# ============================================================================
[gcp_db]
g-test-poc-1 ansible_host=10.160.152.11 ansible_hostname=gcp-dbhost-1 logical_id=gcp-dbhost-1 region=gcp zone=gcp-asia-east1-a ansible_python_interpreter=/usr/bin/python3.12
g-test-poc-2 ansible_host=10.160.152.12 ansible_hostname=gcp-dbhost-2 logical_id=gcp-dbhost-2 region=gcp zone=gcp-asia-east1-b ansible_python_interpreter=/usr/bin/python3.12
g-test-poc-3 ansible_host=10.160.152.13 ansible_hostname=gcp-dbhost-3 logical_id=gcp-dbhost-3 region=gcp zone=gcp-asia-east1-c ansible_python_interpreter=/usr/bin/python3.12

# ============================================================================
# Cross-region cluster (6-node)
# ============================================================================
[crossregion_cluster:children]
idc_db
gcp_db

# ============================================================================
# HAProxy
# ============================================================================
[gcp_haproxy]
g-test-poc-4 ansible_host=10.160.152.14 ansible_hostname=gcp-haproxy logical_id=gcp-haproxy region=gcp zone=gcp-asia-east1-a ansible_python_interpreter=/usr/bin/python3.12

[idc_haproxy]
172.24.47.20 ansible_hostname=idc-haproxy logical_id=idc-haproxy region=idc zone=idc-vlan241 ansible_python_interpreter=/usr/bin/python3.12

# ============================================================================
# TPCC clients
# ============================================================================
[tpcc_client_idc]
172.24.40.31 ansible_hostname=idc-client logical_id=idc-client region=idc zone=idc-vlan241 ansible_python_interpreter=/usr/bin/python3.12 ansible_connection=local

[gcp_client]
g-test-poc-5 ansible_host=10.160.152.15 ansible_hostname=gcp-client logical_id=gcp-client region=gcp zone=gcp-asia-east1-a ansible_python_interpreter=/usr/bin/python3.12

[tpcc_clients:children]
tpcc_client_idc
gcp_client

# ============================================================================
# Phase metadata
# ============================================================================
[crossregion_cluster:vars]
phase=phase-crossregion
result_scope=X-CROSS
cluster_hosts=idc-dbhost-1@172.24.40.32 idc-dbhost-2@172.24.40.33 idc-dbhost-3@172.24.40.34 gcp-dbhost-1@10.160.152.11 gcp-dbhost-2@10.160.152.12 gcp-dbhost-3@10.160.152.13

# SSH options for all hosts (controller = .31)
[all:vars]
ansible_user=root
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10'
