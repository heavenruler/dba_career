# TiDB TC4 — Route B (GCP primary)
# PD quorum: poc-1(IDC) + gcp-1 + gcp-2(GCP) → GCP 斷線後 IDC fail-closed
# TiDB: poc-1(IDC) + gcp-1 + gcp-2(GCP)
# TiKV: all 5 nodes (RF=3)
# HAProxy: poc-3(IDC only) → poc-1:4000；GCP 直連 gcp-1/gcp-2:4000

[tidb_control]
172.24.40.32 ansible_hostname=l-test-poc-1

[tidb_pd]
172.24.40.32 ansible_hostname=l-test-poc-1 tidb_zone=idc
g-test-poc-1 tidb_zone=gcp
g-test-poc-2 tidb_zone=gcp

[tidb_server]
172.24.40.32 ansible_hostname=l-test-poc-1 tidb_zone=idc
g-test-poc-1 tidb_zone=gcp
g-test-poc-2 tidb_zone=gcp

[tidb_kv]
172.24.40.32 ansible_hostname=l-test-poc-1 tidb_zone=idc
172.24.40.33 ansible_hostname=l-test-poc-2 tidb_zone=idc
172.24.40.34 ansible_hostname=l-test-poc-3 tidb_zone=idc
g-test-poc-1 tidb_zone=gcp
g-test-poc-2 tidb_zone=gcp

[haproxy]
172.24.40.34 ansible_hostname=l-test-poc-3 haproxy_backends="172.24.40.32:4000"
