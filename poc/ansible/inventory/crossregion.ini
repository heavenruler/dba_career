# Ansible inventory for phase-crossregion (6-node TiDB/CRDB/YBDB + GCP haproxy + GCP/IDC clients)
#
# Derived from: phase-crossregion/inventory/crossregion.ini.template
# Decision  : phase-crossregion/decisions-2026-06-08.md
#   Q1  → 5 GCP VM (3 db + 1 haproxy + 1 client; IAP tunnel 12211–12215)
#   Q6  → A-A 雙 client orchestration: IDC client (.31) + GCP client (g-test-poc-5)
#   Q10 → chrony cross-region drift gate (<100ms fail-closed)
#
# NOTE: GCP VM 透過 IAP tunnel (iac-gcp/tunnel.sh) 在 Mac/IDC client 本地 forward
#       到 localhost:12211–12215；ansible 從 .31 (IDC client) 或 Mac 出發都可以。
#       ansible_host=localhost ansible_port=<tunnel-port>。

# ============================================================================
# IDC region (3 db nodes; vlan241)
# ============================================================================
[idc_db]
172.24.40.32 ansible_hostname=idc-dbhost-1 logical_id=idc-dbhost-1 region=idc zone=idc-vlan241 ansible_python_interpreter=/usr/bin/python3.12
172.24.40.33 ansible_hostname=idc-dbhost-2 logical_id=idc-dbhost-2 region=idc zone=idc-vlan241 ansible_python_interpreter=/usr/bin/python3.12
172.24.40.34 ansible_hostname=idc-dbhost-3 logical_id=idc-dbhost-3 region=idc zone=idc-vlan241 ansible_python_interpreter=/usr/bin/python3.12

# ============================================================================
# GCP region (3 db nodes; asia-east1 zone a/b/c via IAP tunnel)
# ============================================================================
[gcp_db]
g-test-poc-1 ansible_host=localhost ansible_port=12211 ansible_hostname=gcp-dbhost-1 logical_id=gcp-dbhost-1 region=gcp zone=gcp-asia-east1-a ansible_python_interpreter=/usr/bin/python3.12
g-test-poc-2 ansible_host=localhost ansible_port=12212 ansible_hostname=gcp-dbhost-2 logical_id=gcp-dbhost-2 region=gcp zone=gcp-asia-east1-b ansible_python_interpreter=/usr/bin/python3.12
g-test-poc-3 ansible_host=localhost ansible_port=12213 ansible_hostname=gcp-dbhost-3 logical_id=gcp-dbhost-3 region=gcp zone=gcp-asia-east1-c ansible_python_interpreter=/usr/bin/python3.12

# ============================================================================
# Cross-region cluster (6-node TiDB/CRDB/YBDB; children = idc_db + gcp_db)
# ============================================================================
[crossregion_cluster:children]
idc_db
gcp_db

# ============================================================================
# HAProxy (GCP side; g-test-poc-4; IDC haproxy lives on 172.24.40.20 既有)
# ============================================================================
[gcp_haproxy]
g-test-poc-4 ansible_host=localhost ansible_port=12214 ansible_hostname=gcp-haproxy logical_id=gcp-haproxy region=gcp zone=gcp-asia-east1-a ansible_python_interpreter=/usr/bin/python3.12

# IDC haproxy (既有 .20 / l-monitor-labroom-1) — 不重新部署，只列出供 inventory 參照
[idc_haproxy]
172.24.40.20 ansible_hostname=idc-haproxy logical_id=idc-haproxy region=idc zone=idc-vlan241 ansible_python_interpreter=/usr/bin/python3.12

# ============================================================================
# TPCC clients
# ============================================================================
# IDC TPC-C client (.31 = l-test-poc-0 既有)
[tpcc_client_idc]
172.24.40.31 ansible_hostname=idc-client logical_id=idc-client region=idc zone=idc-vlan241 ansible_python_interpreter=/usr/bin/python3.12

# GCP TPC-C client (g-test-poc-5; A-A-RO + A-A 模式啟用，A-S 模式 passive)
[gcp_client]
g-test-poc-5 ansible_host=localhost ansible_port=12215 ansible_hostname=gcp-client logical_id=gcp-client region=gcp zone=gcp-asia-east1-a ansible_python_interpreter=/usr/bin/python3.12

# Union: A-A / A-A-RO 雙 client orchestration target
[tpcc_clients:children]
tpcc_client_idc
gcp_client

# ============================================================================
# Phase metadata
# ============================================================================
[crossregion_cluster:vars]
phase=phase-crossregion
result_scope=X-CROSS
# CLUSTER_HOSTS used by metrics fan-out scripts (logical_id@<addr>:<port>)
cluster_hosts=idc-dbhost-1@172.24.40.32 idc-dbhost-2@172.24.40.33 idc-dbhost-3@172.24.40.34 gcp-dbhost-1@localhost:12211 gcp-dbhost-2@localhost:12212 gcp-dbhost-3@localhost:12213
